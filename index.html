<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aesthetic Greeting Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Dancing+Script&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card" id="card">
    <div class="card-header">Hello My Angry Bird🩷</div>
    <div class="card-body">
      you are not just my boyfriend, you are my safe place.<br>
      I know we have some misunderstandings, but my feeling for you are real and always will be.🩷<br>
      💗Out of everyone in this world, my heart still chooses you.💗
    </div>
    <div class="card-footer">Always yours<br>
    -penguin🐧</div>
    <button id="playMusicBtn">Touch me👻</button>
  </div>

  <!-- Floating Hearts -->
  <div id="hearts-container"></div>

  <!-- Background Music -->
  <audio id="bgMusic" src="Arijit Singh, Shreya Ghoshal - Samjhawan - Lyric video  Alia B, Varun D  Humpty Sharma Ki Dulhania - SonyMusicIndiaVEVO.mp3" loop></audio>

  <script src="script.js"></script>
</body>
</html>
